<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>IdealPaw</title>

  <meta name="theme-color" content="#ff8fb8" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="IdealPaw" />
  <meta name="mobile-web-app-capable" content="yes" />

  <link rel="manifest" href="public/assets/manifest.json?v=20260708-idealpaw-final3" />
  <link rel="icon" type="image/png" sizes="192x192" href="public/assets/icons/icon-192.png?v=20260708-idealpaw-final3" />
  <link rel="icon" type="image/png" sizes="512x512" href="public/assets/icons/icon-512.png?v=20260708-idealpaw-final3" />
  <link rel="apple-touch-icon" sizes="192x192" href="public/assets/icons/icon-192.png?v=20260708-idealpaw-final3" />
  <style>
    :root{
      --ink:#3e3155;
      --muted:#746680;
      --card:rgba(255,255,255,.68);
      --card2:rgba(255,255,255,.82);
      --line:rgba(255,255,255,.58);
      --main:#ff8fb8;
      --main2:#ffd76b;
      --blue:#76c9ff;
      --shadow:0 18px 48px rgba(22,16,55,.22);
      --radius:28px;
    }
    *{box-sizing:border-box}
    html,body{min-height:100%}
    body{
      margin:0;
      min-height:100vh;
      font-family:"Hiragino Sans","Yu Gothic",Meiryo,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      color:var(--ink);
      background:
        linear-gradient(135deg, rgba(10,8,35,.05), rgba(10,8,35,.24)),
        url("public/space_background.png"),
        url("./space_background.png");
      background-size:cover,cover,cover;
      background-position:center center;
      background-repeat:no-repeat;
      background-attachment:fixed;
      background-color:#100b34;
      overflow-x:hidden;
    }
    .app{
      width:min(430px,100%);
      min-height:100vh;
      margin:0 auto;
      padding:18px 14px 36px;
    }
    .top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:9px;
      color:#fff9cf;
      font-weight:900;
      letter-spacing:.04em;
      text-shadow:0 2px 10px rgba(30,18,70,.6);
    }
    .logo{
      width:38px;height:38px;border-radius:15px;
      display:grid;place-items:center;
      background:linear-gradient(135deg,#fff,#ff9ccc);
      color:#5a3672;
      box-shadow:var(--shadow);
    }
    .card{
      background:rgba(255,255,255,.42);
      border:1px solid rgba(255,255,255,.42);
      border-radius:var(--radius);
      box-shadow:0 12px 32px rgba(22,16,55,.14);
      padding:20px;
      margin:12px 0;
      -webkit-backdrop-filter:blur(8px);
      backdrop-filter:blur(8px);
    }
    .spaceCard{
      background:transparent;
      border:none;
      box-shadow:none;
      -webkit-backdrop-filter:none;
      backdrop-filter:none;
      padding:10px 2px 18px;
    }
    .spaceCard h1,.spaceCard h2,.spaceCard h3{
      color:#fff9cf;
      text-shadow:0 2px 10px rgba(30,18,70,.58),0 0 18px rgba(255,255,255,.24);
    }
    h1,h2,h3{
      color:#fff9cf;
      text-shadow:0 2px 10px rgba(30,18,70,.58),0 0 18px rgba(255,255,255,.24);
      margin:4px 0 12px;
      line-height:1.25;
      letter-spacing:.02em;
    }
    h1{font-size:27px}
    h2{font-size:21px}
    h3{font-size:16px}
    .card h1,.card h2,.card h3,.modal h2,.resultCard h2{
      color:var(--ink);
      text-shadow:none;
    }
    .card.spaceCard h1,.card.spaceCard h2,.card.spaceCard h3{
      color:#fff9cf;
      text-shadow:0 2px 10px rgba(30,18,70,.58),0 0 18px rgba(255,255,255,.24);
    }
    p{line-height:1.75;margin:10px 0;color:var(--ink)}
    .lead{
      font-size:16px;
      color:#fff;
      text-shadow:0 2px 8px rgba(30,18,70,.62);
    }
    .small{font-size:13px;color:var(--muted);line-height:1.65}
    .center{text-align:center}
    .hidden{display:none!important}
    .row{display:flex;gap:10px;align-items:center;justify-content:center;flex-wrap:wrap}
    .between{display:flex;align-items:center;justify-content:space-between;gap:10px}
    .pill{
      display:inline-flex;align-items:center;gap:6px;
      padding:7px 10px;border-radius:999px;
      background:rgba(255,255,255,.78);
      border:1px solid rgba(255,255,255,.68);
      font-size:12px;color:#5d4a6f;
      -webkit-backdrop-filter:blur(8px);
      backdrop-filter:blur(8px);
    }
    button,.button{
      appearance:none;border:none;border-radius:999px;
      padding:13px 18px;
      background:linear-gradient(135deg,var(--main),var(--main2));
      color:white;font-weight:800;font-size:15px;
      box-shadow:0 8px 18px rgba(255,143,177,.35);
      cursor:pointer;text-decoration:none;display:inline-flex;justify-content:center;align-items:center;
      min-height:44px;
    }
    button.secondary{background:rgba(255,255,255,.84);color:#5d4a6f;border:1px solid rgba(255,255,255,.72);box-shadow:none}
    button.ghost{background:rgba(255,255,255,.42);color:#fff;border:1px dashed rgba(255,255,255,.72);box-shadow:none;text-shadow:0 1px 5px rgba(30,18,70,.45)}
    button:disabled{opacity:.48;cursor:not-allowed}
    .wide{width:100%}
    input,select,textarea{
      width:100%;border:1px solid rgba(117,96,150,.18);border-radius:16px;background:rgba(255,255,255,.92);
      color:var(--ink);font-size:16px;padding:13px 14px;outline:none;
    }
    textarea{min-height:100px;resize:vertical;line-height:1.65}
    label{display:block;font-weight:800;margin:13px 0 7px}
    .checkline{display:flex;align-items:flex-start;gap:10px;margin:10px 0;line-height:1.6;font-weight:700}
    .checkline input{width:auto;margin-top:4px;accent-color:#b88cff}
    .meter{
      height:14px;border-radius:999px;background:rgba(255,255,255,.55);overflow:hidden;border:1px solid rgba(117,96,150,.15);
    }
    .meter>span{display:block;height:100%;width:0%;background:linear-gradient(90deg,#ff8fb8,#ffd76b,#9be66f);transition:.3s}
    .stage{
      position:relative;
      min-height:285px;
      border-radius:28px;
      background:transparent;
      overflow:hidden;
      border:none;
      display:flex;align-items:center;justify-content:center;flex-direction:column;
      margin:12px 0;
    }
    img{
      -webkit-user-drag:none;
      user-select:none;
    }
    .petImg{
      width:200px;height:200px;max-width:64vw;object-fit:contain;
      filter: drop-shadow(0 18px 18px rgba(25,18,65,.22));
      animation:floaty 2.8s ease-in-out infinite;
      background-color:transparent;
      background-repeat:no-repeat;
      background-position:center center;
      background-size:contain;
      display:block;
      user-select:none;
      -webkit-user-drag:none;
      -webkit-touch-callout:none;
      pointer-events:none;
    }
    .petImg.small{width:170px;height:170px}
    .fallbackPet{font-size:92px;line-height:1;filter: drop-shadow(0 12px 12px rgba(70,50,50,.16));animation:floaty 2.6s ease-in-out infinite;user-select:none;pointer-events:none;}
    .careMeterGrid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin:12px 0;
    }
    .careMeterItem{
      background:rgba(255,255,255,.62);
      border:1px solid rgba(255,255,255,.58);
      border-radius:18px;
      padding:9px 10px;
      -webkit-backdrop-filter:blur(8px);
      backdrop-filter:blur(8px);
    }
    .careMeterItem .between{
      font-size:12px;
      font-weight:900;
      color:#5d4a6f;
      margin-bottom:6px;
    }
    .careMeterItem .meter{
      height:10px;
    }
    @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
    .pet-motion-rabbit{animation:rabbitHop 3.6s ease-in-out infinite;transform-origin:50% 92%}
    .pet-motion-kangaroo{animation:kangarooJump 2.7s cubic-bezier(.25,.9,.3,1) infinite;transform-origin:50% 95%}
    .pet-motion-penguin{animation:penguinWaddle 5.6s steps(7,end) infinite;transform-origin:50% 95%}
    .pet-motion-seal{animation:sealRoll 10s ease-in-out infinite;transform-origin:50% 55%}
    .pet-motion-lizard{animation:lizardLook 3.1s ease-in-out infinite;transform-origin:50% 75%}
    .pet-motion-cat{animation:catDash 5.2s ease-in-out infinite;transform-origin:50% 88%}
    @keyframes rabbitHop{0%,26%,43%,68%,100%{transform:translateY(0) rotate(0)}31%{transform:translateY(-22px) rotate(-3deg)}37%{transform:translateY(0) rotate(2deg)}73%{transform:translateY(-22px) rotate(3deg)}79%{transform:translateY(0) rotate(-2deg)}}
    @keyframes kangarooJump{0%,100%{transform:translateY(0) scale(1) rotate(0)}10%{transform:translateY(3px) scaleX(1.04) scaleY(.94)}24%{transform:translateY(-34px) scaleX(.94) scaleY(1.08) rotate(-3deg)}36%{transform:translateY(0) scaleX(1.05) scaleY(.94) rotate(2deg)}58%{transform:translateY(0) scale(1) rotate(0)}72%{transform:translateY(-28px) scaleX(.96) scaleY(1.06) rotate(3deg)}84%{transform:translateY(0) scaleX(1.03) scaleY(.96) rotate(-1deg)}}
    @keyframes penguinWaddle{0%{transform:translateX(48px) rotate(4deg)}16%{transform:translateX(32px) translateY(-3px) rotate(-5deg)}32%{transform:translateX(16px) rotate(5deg)}48%{transform:translateX(0px) translateY(-3px) rotate(-4deg)}64%{transform:translateX(-16px) rotate(4deg)}80%{transform:translateX(-32px) translateY(-2px) rotate(-3deg)}100%{transform:translateX(-46px) rotate(3deg)}}
    @keyframes sealRoll{0%{transform:rotate(0deg) scale(1)}22%{transform:rotate(360deg) scale(1.01)}44%,68%{transform:rotate(720deg) scale(1)}100%{transform:rotate(1080deg) scale(1.01)}}
    @keyframes lizardLook{0%,100%{transform:translateX(0) rotate(0deg) scaleX(1)}18%{transform:translateX(5px) rotate(3deg) scaleX(1)}36%,54%{transform:translateX(-5px) rotate(-3deg) scaleX(-1)}72%{transform:translateX(5px) rotate(3deg) scaleX(1)}}
    @keyframes catDash{0%{transform:translateX(-54px) rotate(0deg)}18%{transform:translateX(46px) translateY(-6px) rotate(4deg)}31%{transform:translateX(58px) rotate(0deg)}44%{transform:translateX(24px) translateY(-10px) rotate(160deg)}56%{transform:translateX(-6px) rotate(360deg)}72%{transform:translateX(-52px) translateY(-5px) rotate(355deg)}88%{transform:translateX(14px) rotate(370deg)}100%{transform:translateX(-54px) rotate(360deg)}}
    .cleanGameArea{min-height:390px;position:relative;border-radius:28px;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.22);overflow:hidden;margin-top:14px}
    .cleanTarget{display:inline-flex;align-items:center;gap:8px;padding:9px 13px;border-radius:999px;background:rgba(255,255,255,.76);font-weight:900;color:var(--ink);box-shadow:0 8px 18px rgba(30,18,70,.14)}
    .cleanDot{width:18px;height:18px;border-radius:999px;background:var(--target,#ffd76b);box-shadow:0 0 14px var(--target,#ffd76b);border:2px solid #fff}
    .movingPoop{position:absolute;width:58px;height:58px;min-height:58px;padding:0;display:grid;place-items:center;border-radius:999px;border:4px solid var(--ring,#ffd76b);background:rgba(255,255,255,.72);font-size:34px;box-shadow:0 0 18px color-mix(in srgb,var(--ring,#ffd76b) 65%,transparent),0 10px 18px rgba(25,18,65,.18);animation:poopDrift var(--dur,2.6s) ease-in-out infinite alternate;user-select:none;cursor:pointer}
    .movingPoop.cleaned{opacity:0!important;pointer-events:none!important;animation:none!important}
    .movingPoop.wrong{animation:poopWrong .32s ease-in-out 1!important}
    @keyframes poopDrift{from{transform:translate(0,0) rotate(-8deg) scale(1)}to{transform:translate(var(--dx,42px),var(--dy,-28px)) rotate(10deg) scale(1.05)}}
    @keyframes poopWrong{0%,100%{transform:translateX(0)}25%{transform:translateX(-9px)}50%{transform:translateX(9px)}75%{transform:translateX(-5px)}}
    .speech{
      max-width:92%;background:rgba(255,255,255,.84);border:1px solid rgba(255,255,255,.7);border-radius:20px;padding:12px 14px;
      line-height:1.55;font-weight:800;box-shadow:0 8px 18px rgba(80,50,30,.08);margin-top:10px;
      -webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);
    }
    .giftWrap{
      min-height:330px;
      display:grid;
      place-items:center;
      gap:16px;
    }
    .giftImg{
      width:min(330px,82vw);
      height:min(330px,82vw);
      max-height:330px;
      object-fit:contain;
      display:block;
      cursor:pointer;
      filter:drop-shadow(0 26px 34px rgba(23,16,70,.30));
      animation:giftFloat 3.2s ease-in-out infinite;
      background-color:transparent!important;
      background-repeat:no-repeat!important;
      background-position:center center!important;
      background-size:contain!important;
      user-select:none;
      -webkit-user-drag:none;
      -webkit-touch-callout:none;
    }
    .giftImg.opened{animation:giftOpen 1.05s ease both}
    @keyframes giftFloat{0%,100%{transform:translateY(0) rotate(-1deg)}50%{transform:translateY(-12px) rotate(1deg)}}
    @keyframes giftOpen{0%{transform:scale(1);opacity:1}60%{transform:scale(1.07);filter:brightness(1.25) drop-shadow(0 28px 38px rgba(23,16,70,.30))}100%{transform:translateY(18px) scale(.86);opacity:.38}}
    .macaronImg{
      width:220px;height:170px;object-fit:contain;display:block;margin:8px auto;
      filter:drop-shadow(0 18px 18px rgba(25,18,65,.22));
      animation:floaty 2.4s ease-in-out infinite;
      background-color:transparent!important;
      background-repeat:no-repeat!important;
      background-position:center center!important;
      background-size:contain!important;
      user-select:none;
      -webkit-user-drag:none;
      -webkit-touch-callout:none;
      pointer-events:none;
    }
    .macaronFallback{font-size:94px;animation:floaty 2.4s ease-in-out infinite;user-select:none}
    .hearts{position:absolute;inset:0;pointer-events:none;overflow:hidden}
    .heart{position:absolute;font-size:22px;animation:rise 1.4s ease-out forwards}
    @keyframes rise{0%{transform:translateY(0) scale(.7);opacity:0}20%{opacity:1}100%{transform:translateY(-110px) scale(1.3);opacity:0}}
    .actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
    .choiceGrid{display:grid;grid-template-columns:1fr;gap:10px;margin-top:10px}
    .notice{
      border-left:5px solid var(--main2);
      background:rgba(255,248,236,.88);border-radius:16px;padding:12px 13px;line-height:1.7;
    }

    /* ===========================================================
       案内バブル（ガイド表示）
       相棒のセリフ（.speech）とは別枠の、操作案内専用の表示です。
       全条件（P/S × C1〜C4）で同一の文言・同一のタイミングで表示され、
       実験操作（セリフの頻度・言い回し・記憶手がかり）には関与しません。
       =========================================================== */
    .guideTip{
      display:flex;
      align-items:flex-start;
      gap:10px;
      margin:12px 0 2px;
      padding:12px 13px;
      border-radius:18px;
      border-left:5px solid var(--blue);
      background:rgba(235,247,255,.92);
      color:#3c4a63;
      font-size:13px;
      line-height:1.7;
      -webkit-backdrop-filter:blur(8px);
      backdrop-filter:blur(8px);
    }
    .guideTipIcon{
      flex:0 0 auto;
      width:28px;height:28px;
      border-radius:10px;
      display:grid;place-items:center;
      background:linear-gradient(135deg,#fff,#bfe4ff);
      color:#3b6ea8;
      font-size:15px;
      margin-top:1px;
    }
    .guideTipBody{flex:1 1 auto}
    .guideTipClose{
      flex:0 0 auto;
      appearance:none;
      border:1px solid rgba(90,120,160,.28);
      background:rgba(255,255,255,.86);
      color:#3b6ea8;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
      padding:4px 10px;
      min-height:0;
      box-shadow:none;
      cursor:pointer;
      margin-top:1px;
    }

    .topActions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    .installAppBtn{
      background:rgba(255,255,255,.78)!important;
      color:#5d4a6f!important;
      border:1px solid rgba(255,255,255,.72)!important;
      box-shadow:none!important;
      padding:10px 12px!important;
      min-height:38px!important;
      font-size:13px!important;
      white-space:nowrap;
    }
    .installHelpBox{
      margin-top:10px;
      padding:12px 14px;
      border-radius:16px;
      background:rgba(255,248,236,.92);
      border-left:5px solid var(--main2);
      color:#5d4a6f;
      font-size:13px;
      line-height:1.7;
    }

    .admin{
      border:1px dashed #d9a86c;background:rgba(255,249,237,.92);border-radius:16px;padding:10px;margin-top:12px;
    }
    .resultCard{
      background:linear-gradient(160deg,#fff,#fff3df 70%,#ffe7ef);
      border:2px solid #ffd09b;
      border-radius:28px;
      padding:18px;text-align:center;
    }
    
    .zukanSilhouetteWrap{
      width:min(210px,64vw);
      height:150px;
      margin:14px auto 10px;
      display:grid;
      place-items:center;
      border-radius:28px;
      background:rgba(255,255,255,.34);
      box-shadow:inset 0 0 24px rgba(255,255,255,.26);
    }
    .zukanSilhouetteImg{
      width:190px;
      height:130px;
      max-width:100%;
      max-height:100%;
      object-fit:contain;
      object-position:center center;
      display:block;
      /* 元の public/assets/pets の絵を、そのまま黒いシルエット化する */
      filter:grayscale(1) brightness(.18) contrast(2.2) drop-shadow(0 12px 14px rgba(45,35,70,.18));
      opacity:.92;
    }
    .silhouette{font-size:88px;filter:grayscale(1) brightness(.25);opacity:.82;margin:8px 0}
    .zukanEmojiSilhouette{
      font-size:86px;
      line-height:1;
      filter:grayscale(1) brightness(.05);
      opacity:.86;
      transform:scale(1.05);
      text-shadow:0 12px 16px rgba(38,29,68,.16);
      user-select:none;
    }
    .zukanEmojiSilhouette.small{
      font-size:34px;
      transform:none;
      margin-top:8px;
    }
    .zukanMissingImage{
      width:190px;
      height:130px;
      display:grid;
      place-items:center;
      border-radius:24px;
      background:rgba(255,255,255,.46);
      border:1px dashed rgba(117,96,150,.32);
      color:#6b5d7a;
      font-weight:900;
      text-align:center;
      line-height:1.35;
    }
    .zukanMissingImage.small{
      width:58px;
      height:46px;
      border-radius:12px;
      font-size:24px;
      background:rgba(255,255,255,.62);
    }
    .zukanMissingMark{
      font-size:44px;
      line-height:1;
    }
    .zukanMissingText{
      font-size:12px;
      margin-top:4px;
      color:#6b5d7a;
    }
    .zukanNo{font-size:13px;color:var(--muted);margin:4px 0 8px}
    .basisText{font-size:13px;color:var(--muted);line-height:1.7;margin-top:8px}
    .zukanStatus{
      margin:12px 0;
      padding:12px 14px;
      border-radius:20px;
      background:rgba(255,255,255,.66);
      border:1px solid rgba(255,255,255,.58);
      color:var(--ink);
      -webkit-backdrop-filter:blur(8px);
      backdrop-filter:blur(8px);
    }
    .zukanStatusGrid{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:8px;
      margin-top:10px;
      text-align:center;
    }
    .zukanStatusMini{
      padding:8px 6px;
      border-radius:16px;
      background:rgba(255,255,255,.7);
      border:1px solid rgba(255,255,255,.65);
      font-size:12px;
      color:#5d4a6f;
      font-weight:800;
    }
    .zukanHeartBar{
      height:10px;
      border-radius:999px;
      background:rgba(255,255,255,.72);
      overflow:hidden;
      margin-top:10px;
      border:1px solid rgba(255,255,255,.65);
    }
    .zukanHeartBar span{
      display:block;
      height:100%;
      width:0%;
      border-radius:999px;
      background:linear-gradient(90deg,#ff8fb8,#ffd76b);
    }
    .zukanType{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:6px 12px;
      border-radius:999px;
      background:#fff4fb;
      border:1px solid #ffd4e8;
      color:#d45f91;
      font-size:13px;
      font-weight:900;
      margin:4px 0 8px;
    }
    .zukanCardMessage{
      background:rgba(255,255,255,.72);
      border:1px solid rgba(255,255,255,.68);
      border-radius:20px;
      padding:12px 14px;
      margin:10px 0;
      text-align:left;
      line-height:1.75;
    }
    .zukanGrid{
      display:grid;
      grid-template-columns:repeat(5,minmax(0,1fr));
      gap:8px;
      margin-top:14px;
    }
    .zukanCell{
      min-height:72px;
      border-radius:16px;
      display:grid;
      place-items:center;
      background:rgba(255,255,255,.58);
      border:1px solid rgba(255,255,255,.58);
      position:relative;
      overflow:hidden;
    }
    .zukanCell.locked{opacity:.38;filter:grayscale(1)}

  function loadState(){

  function uid(prefix="R"){
    return `${prefix}-${Date.now().toString(36).toUpperCase()}-${Math.random().toString(36).slice(2,8).toUpperCase()}`;
  }
  function todayStartDateForTime(timeStr){
    const now = new Date();
    const [hh,mm] = (timeStr || "00:00").split(":").map(Number);
    const d = new Date(now);
    d.setHours(hh || 0, mm || 0, 0, 0);
    if(d.getTime() < now.getTime() - 60000) d.setDate(d.getDate()+1);
    return d;
  }
  const DAY_MS = 24 * 60 * 60 * 1000;

  // 研究日数の定義：
  // デジタル存在が生まれた時刻を1日目の開始時刻とし、以後24時間ごとに次の日へ進みます。
  // 参加者ごとの1日目の長さが大きく変わらないようにし、関与時間の差が条件差に混ざりにくくします。
  // 画面上の大きな日数説明カードは出さず、必要な案内は閉じられるガイドチップだけにします。
  function researchStartMs(){
    const base = state.hatch_at || state.care_started_at || state.start_at;
    const ms = Date.parse(base || "");
    return Number.isFinite(ms) ? ms : Date.now();
  }
  function researchDayStartMs(day){
    const d = Math.max(1, Number(day) || 1);
    return researchStartMs() + (d - 1) * DAY_MS;
  }
  function nextResearchDayStartMs(day=currentDay()){
    if(state.mode !== "research") return null;
    if(Number(day) >= 5) return null;
    return researchDayStartMs(Number(day) + 1);
  }
  function currentDay(){
    if(state.mode === "free") return 1;
    if(CONFIG.ADMIN_MODE && state.day_override) return clamp(state.day_override,1,5);
    const start = researchStartMs();
    const diff = Math.floor((Date.now() - start) / DAY_MS);
    return clamp(diff + 1, 1, 5);
  }

  // 5日目は誕生から96時間後に始まり、120時間後に終了します。
  // 120時間を過ぎたら、参加者がボタンを押さなくても最後のアンケートへ進みます。
  function researchEndMs(){
    return researchStartMs() + (5 * DAY_MS);
  }
  function researchHasEnded(){
    return state.mode === "research"
      && !!state.hatch_at
      && !!state.care_started_at
      && Date.now() >= researchEndMs();
  }
  let surveyTransitionTimer = null;
  function openSurveyAfterDay5(){
    if(CONFIG.ADMIN_MODE || state.mode !== "research" || state.completed_survey) return false;
    if(!researchHasEnded()) return false;

    if(!state.survey_auto_opened_at){
      state.survey_auto_opened_at = new Date().toISOString();
      state.screen = "survey";
      saveState();
      logEvent("survey_open", {
        source:"automatic_after_day5_end",
        research_end_at:new Date(researchEndMs()).toISOString(),
        elapsed_hours:Math.floor((Date.now() - researchStartMs()) / 3600000)
      });
    }else{
      state.screen = "survey";
      saveState();
    }

    renderSurvey();
    window.scrollTo({top:0, behavior:"smooth"});
    return true;
  }
  function scheduleSurveyAfterDay5(){
    if(surveyTransitionTimer){
      clearTimeout(surveyTransitionTimer);
      surveyTransitionTimer = null;
    }
    if(CONFIG.ADMIN_MODE || state.mode !== "research" || state.completed_survey || !state.hatch_at || !state.care_started_at) return;

    const remaining = researchEndMs() - Date.now();
    if(remaining <= 0){
      setTimeout(openSurveyAfterDay5, 0);
      return;
    }
    surveyTransitionTimer = setTimeout(openSurveyAfterDay5, remaining + 1000);
  }
  function formatLocalDateTime(ms){
    if(!ms) return "";
    const locale = L() === "en" ? "en-US" : L() === "zh-CN" ? "zh-CN" : "ja-JP";
    const d = new Date(ms);
    try{
      return d.toLocaleString(locale, {month:"numeric", day:"numeric", hour:"2-digit", minute:"2-digit"});
    }catch(e){
      return d.toLocaleString();
    }
  }
  function researchDayInfoHtml(day){
    // 参加者画面では常時表示カードを出しません。
    // 管理者モードで日付を手動指定している時だけ、確認用に小さく表示します。
    if(state.mode !== "research") return "";
    if(CONFIG.ADMIN_MODE && state.day_override){
      return `<div class="zukanStatus small">管理者確認中：${esc(day)}日目を表示しています。参加者画面では、生まれた時刻から24時間ごとに日数が進みます。</div>`;
    }
    return "";
  }

  // 生活リズム設定：
  // 研究モードでは、デジタル存在が生まれた時刻から24時間ごとに日数が進みます。
  // つづきのお世話でも、従来どおり開始から24時間ごとの生活サイクルにします.
  // 最後のお世話から半日（12時間）以上たったら、相棒はさみしそうに待つか、眠って待ちます。
  // その状態でお世話ボタンを押すと起きて、また関わりが始まります。
  // さらに、「ごはん・おでかけ・なでる・きれいにする」の4つがすべて満タンになったら、
  // 満足して10分ほど昼寝します.
  function lifeBaseMs(){
    const base = state.mode === "free"
      ? (state.free_started_at || state.care_started_at || state.hatch_at || state.start_at)
      : (state.care_started_at || state.hatch_at || state.start_at);
    const ms = Date.parse(base || "");
    return Number.isFinite(ms) ? ms : Date.now();
  }
  function lifeCycleNumber(){
    const base = lifeBaseMs();
    return Math.max(1, Math.floor((Date.now() - base) / DAY_MS) + 1);
  }
  function lifeDayStartMs(){
    const base = lifeBaseMs();
    if(CONFIG.ADMIN_MODE && state.day_override && state.mode === "research") return Date.now();
    if(state.mode === "free") return base + (lifeCycleNumber() - 1) * DAY_MS;
    const day = currentDay();
    return day <= 1 ? researchStartMs() : researchDayStartMs(day);
  }
  function ensureCareMeters(){
    const base = {feed:0, outing:0, pet:0, clean:0};
    state.care_meters = {...base, ...(state.care_meters || {})};
    state.care_meters_total = {...base, ...(state.care_meters_total || {})};
    if(typeof state.full_meter_count !== "number") state.full_meter_count = 0;
    Object.keys(base).forEach(k => {
      state.care_meters[k] = clamp(Number(state.care_meters[k] || 0), 0, 100);
    });
    state.daily_score = careMeterAverage();
    return state.care_meters;
  }
  function resetCareMeters(){
    state.care_meters = {feed:0, outing:0, pet:0, clean:0};
    state.daily_score = 0;
  }
  function careMeterAverage(){
    const m = state.care_meters || {feed:0, outing:0, pet:0, clean:0};
    return Math.round((Number(m.feed || 0) + Number(m.outing || 0) + Number(m.pet || 0) + Number(m.clean || 0)) / 4);
  }
  function allCareMetersFull(){
    const m = ensureCareMeters();
    return ["feed","outing","pet","clean"].every(k => Number(m[k] || 0) >= 100);
  }
  function careMeterLabel(key){
    const dict = {
      feed:{ja:"ごはん", en:"Food", "zh-CN":"喂食"},
      outing:{ja:"おでかけ", en:"Go out", "zh-CN":"外出"},
      pet:{ja:"なでる", en:"Pet", "zh-CN":"抚摸"},
      clean:{ja:"きれい", en:"Clean", "zh-CN":"清理"}
    };
    return dict[key]?.[L()] || dict[key]?.ja || key;
  }
  function careMetersHtml(){
    const m = ensureCareMeters();
    const keys = ["feed","outing","pet","clean"];
    return `<div class="careMeterGrid">${keys.map(k => `
      <div class="careMeterItem">

        <div class="meter"><span style="width:${esc(m[k])}%"></span></div>
      </div>`).join("")}</div>`;
  }

  function restLine(kind){
    const dict = {
      satisfied:{
        ja:"今日はもうおなかいっぱい。満足して、少しだけ眠っています。",
        en:"I am full and happy for today. I am taking a short nap.",
        "zh-CN":"今天已经很满足了。它正在小睡一会儿。"
      },
      lonely:{
        ja:"……待ってたよ。少しさみしかったみたい。",
        en:"...I was waiting for you. I seemed a little lonely.",
        "zh-CN":"……我一直在等你。好像有点寂寞。"
      },
      no_care_sleep:{
        ja:"待っているうちに、すやすや眠ってしまったみたい。",
        en:"It seems to have fallen asleep while waiting for you.",
        "zh-CN":"它好像在等待的时候睡着了。"
      },

  }
  function chooseNoCareRestKind(){
    const seed = String(state.research_id || state.free_started_at || state.care_started_at || Date.now())
      .split("")
      .reduce((a,c)=>a+c.charCodeAt(0),0);
    const cycle = state.mode === "free" ? lifeCycleNumber() : currentDay();
    return ((seed + cycle) % 2 === 0) ? "lonely" : "no_care_sleep";
  }
  function syncLifeClock(){
    if(!state.care_started_at && state.mode !== "free") return;
    const marker = state.mode === "free" ? `free-${lifeCycleNumber()}` : `research-${currentDay()}`;
    if(state.life_day_marker !== marker){
      const prev = state.life_day_marker;
      state.life_day_marker = marker;
      resetCareMeters();
      state.sleeping = false;
      state.rest_state = "";
      state.rest_state_decided_at = "";
      state.daily_care_started_at = "";
      state.satisfied_sleep_until = "";
      state.poop = false;
      if(prev){
        logEvent("life_day_changed", {from:prev, to:marker, no_care_after_hours:12, day_length_hours:24});
      }
    }

    const now = Date.now();
    const napUntil = Date.parse(state.satisfied_sleep_until || "");
    if(Number.isFinite(napUntil) && napUntil > now){
      if(state.rest_state !== "satisfied"){
        state.rest_state = "satisfied";
        state.rest_state_decided_at = new Date().toISOString();
      }
      state.sleeping = true;
      return;
    }

    if(state.rest_state === "satisfied"){
      state.rest_state = "";
      state.satisfied_sleep_until = "";
      state.sleeping = false;
      logEvent("wake_after_satisfied_nap", {marker});
    }

    const lastCare = Date.parse(state.last_care_at || state.care_started_at || state.free_started_at || "");
    const noCareTooLong = Number.isFinite(lastCare) && (now - lastCare >= CONFIG.NO_CARE_AFTER_MS);
    if(noCareTooLong){
      if(state.rest_state !== "lonely" && state.rest_state !== "no_care_sleep"){
        state.rest_state = chooseNoCareRestKind();
        state.rest_state_decided_at = new Date().toISOString();
        logEvent("no_care_rest_state", {rest_state:state.rest_state, no_care_hours:Math.round((now-lastCare)/360000)/10});
      }
      state.sleeping = state.rest_state === "no_care_sleep";
      return;
    }

    if(state.rest_state === "lonely" || state.rest_state === "no_care_sleep"){
      state.rest_state = "";
      state.rest_state_decided_at = "";
      state.sleeping = false;
    }
  }
  function wakeFromNoCareIfNeeded(){
    syncLifeClock();
    if(state.rest_state === "lonely" || state.rest_state === "no_care_sleep"){
      const old = state.rest_state;
      state.rest_state = "";
      state.rest_state_decided_at = "";
      state.sleeping = false;
      state.last_care_at = new Date().toISOString();
      logEvent("wake_by_care_action", {from:old});
      return true;
    }
    return false;
  }
  function maybeStartSatisfiedNap(reason){
    if(state.mode !== "research" && state.mode !== "free") return false;
    if(state.rest_state === "satisfied") return false;

    ensureCareMeters();
    const fullEnough = allCareMetersFull();

    if(fullEnough){
      const now = Date.now();
      state.daily_score = 100;
      state.rest_state = "satisfied";
      state.sleeping = true;
      state.satisfied_sleep_until = new Date(now + CONFIG.SATISFIED_NAP_MS).toISOString();
      state.rest_state_decided_at = new Date().toISOString();
      state.full_meter_count = Number(state.full_meter_count || 0) + 1;
      logEvent("satisfied_nap_start", {
        reason: reason || "all_four_care_meters_full",
        daily_score_at_full:100,
        care_meters_at_full:{...state.care_meters},
        care_meters_total:{...state.care_meters_total},
        full_meter_count:state.full_meter_count,
        meters_reset_on_nap:true,
        nap_minutes:10
      });
      // 満タン達成の記録を送った後に、画面のお世話メーターだけ0に戻す。
      // データ（care_meters_total・full_meter_count）は加算のまま残る。
      resetCareMeters();
      return true;
    }
    return false;
  }

    if(!originalId) return state.display_character_id || state.character_id || "";

  function interpolateLine(line, vars={}){
    return String(line || "")
      .replaceAll("{day}", vars.day ?? "")
      .replaceAll("{value}", vars.value ?? "")

  function localizedChoiceLabel(value){

  function actionKindForLine(action){
    if(action === "feed") return "food";
    if(action === "pet") return "petting";
    if(action === "clean") return "clean";
    if(action === "outing") return "outing";
    return "home";
  }
  function pastCareRowsForMemory(){
    const day = currentDay();
    try{
      return getLocalLogs()
        .filter(r => r.event_type === "game_action")
        .filter(r => Number(r.day || 0) <= Math.min(3, day - 1))
        .filter(r => ["pet","feed","outing","clean"].includes(r.action));
    }catch(e){
      return [];
    }
  }
  function memoryLineForPet(data){
    const memory = data?.memory || {};
    const rows = pastCareRowsForMemory();
    const preferred = ["pet","feed","outing","clean"];
    const cycle = ((currentDay() || 1) + (state.logs?.actions_total || 0)) % preferred.length;
    const ordered = preferred.slice(cycle).concat(preferred.slice(0,cycle));
    let chosen = null;
    for(const action of ordered){
      const found = rows.filter(r => r.action === action).pop();
      if(found){ chosen = found; break; }
    }
    if(!chosen && rows.length) chosen = rows[rows.length - 1];

    if(!chosen){
      return interpolateLine(memory.fallback || "");
    }
    const key = actionKindForLine(chosen.action);
    const template = memory[key] || memory.fallback || "";
    return interpolateLine(template, {
      day: chosen.day || 1,
      value: localizedChoiceLabel(chosen.choice)
    });
  }

  function logEvent(event_type, details={}){
    // つづきのお世話は研究ログ・GAS送信の対象外にします。
    // 管理者確認のため、この端末内の free_debug だけに残します。
    if(state && state.mode === "free"){
      state.free_debug = Array.isArray(state.free_debug) ? state.free_debug : [];
      state.free_debug.push({timestamp:new Date().toISOString(), event_type, screen_id:state.screen, details});
      state.free_debug = state.free_debug.slice(-120);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      updateAdminPanels();
      return;
    }
    const engagementLabel = ENGAGEMENT_LABELS[state.engagement_id] || "";
    const fullConditionCode = (state.engagement_id && state.condition_id)
      ? `${state.engagement_id}-${state.condition_id}`
      : "";
    const payload = {
      received_at:new Date().toISOString(),
      timestamp:new Date().toISOString(),
      research_id:state.research_id || "",
      condition_id:state.condition_id || "",
      condition_label:CONDITION_LABELS[state.condition_id] || "",
      engagement_id:state.engagement_id || "",
      engagement_label:engagementLabel,
      full_condition_code:fullConditionCode,
      character_id:state.character_id || "",
      language:state.language || "ja",
      screen_id:state.screen || "",
      day:state.mode === "research" ? currentDay() : "free",
      event_type,
      affection:state.affection,
      action:details.action || "",
      choice:details.choice || "",
      macaron_color:state.macaron_color || "",
      details_json:JSON.stringify(details),
      user_agent:navigator.userAgent,
      app_version:CONFIG.APP_VERSION
    };
    const logs = JSON.parse(localStorage.getItem(LOG_KEY) || "[]");
    logs.push(payload);
    localStorage.setItem(LOG_KEY, JSON.stringify(logs.slice(-700)));
    const endpoint = String(CONFIG.LOG_ENDPOINT || "").trim();
    if(endpoint.startsWith("https://")){
      fetch(endpoint,{
        method:"POST",
        mode:"cors",
        headers:{"Content-Type":"text/plain;charset=utf-8"},
        body:JSON.stringify(payload),
        keepalive:true
      }).catch(()=>{});
    }
  }

      if(state.condition_id === "C3"){

      if(state.condition_id === "C4"){

      logEvent("condition_applied", {condition_id:state.condition_id, day});

  function lineForPet(action="look", choice=""){
    const day = currentDay();
    if(state.rest_state === "satisfied") return restLine("satisfied");
    if(state.rest_state === "lonely") return restLine("lonely");
    if(state.rest_state === "no_care_sleep") return restLine("no_care_sleep");
    if(state.sleeping) return t("asleep");
    if(state.poop && action !== "clean"){
      return L()==="en" ? "The room seems to be bothering it." : L()==="zh-CN" ? "它好像有点在意房间。" : "部屋が少し気になるみたい。";
    }

    const data = richLineData(behaviorCharacterId());
    const kind = actionKindForLine(action);
    const eng = engagementSettings();

    // C4：記憶手がかり変更条件。見た目・言葉づかい・動きは同じでも、過去の記憶コメントだけ出さない。
    if(state.mode === "research" && state.condition_id === "C4" && day >= 4 && action === "look"){
      return pick(NO_MEMORY_LINES[L()] || NO_MEMORY_LINES.ja);
    }

    // ユーザーの「呼ばれたい名前」を呼ぶセリフ。
    // 4日目以降にこれが出ると、相棒がプレイヤーを覚えている手がかりになる。
    // C4では memory_cues_enabled が false になるため、4日目以降は名前呼びも出ません。
    if(shouldUsePlayerNameCue(action, day, eng)){
      const nameLine = playerNameMemoryLine();
      if(nameLine) return nameLine;
    }

    // 過去のお世話を覚えているセリフ。行動ログに基づいて「なでた」「食べた」「出かけた」記録を話す。
    // 関与条件（促進・抑制）で、出てくる日数・出やすさを変えます。
    if(state.memory_cues_enabled && day >= eng.memoryLineMinDay && action === "look" && Math.random() < eng.memoryLineChance){
      const memoryLine = memoryLineForPet(data);
      if(memoryLine) return memoryLine;
    }

    const pool = data[kind] || data.home || [];
    let baseLine = "";
    if(pool.length){
      baseLine = interpolateLine(pick(pool), { value: localizedChoiceLabel(choice), user: playerCallName() });
    }else{
      const fallback = {
        ja:"来てくれてありがとう。",
        en:"Thank you for coming.",
        "zh-CN":"谢谢你来看我。"
      };
      baseLine = fallback[L()] || fallback.ja;
    }

    // 促進条件では、通常の反応にもう一言添えることがあります。抑制条件ではほぼ添えません。
    if(action !== "look" && Math.random() < eng.bonusLineChance){
      const bonus = pick(BONUS_LINES[L()] || BONUS_LINES.ja);
      baseLine = `${baseLine} ${bonus}`;
    }
    return baseLine;
  }

      h.className = "heart";

  function updateScores(deltaAffection, deltaDaily, careKey=""){
    const beforeFull = allCareMetersFull();
    const eng = engagementSettings();
    const adjustedDelta = Math.round(deltaAffection * eng.affectionMultiplier);
    state.affection = clamp(state.affection + adjustedDelta, 0, 100);

    const m = ensureCareMeters();
    if(["feed","outing","pet","clean"].includes(careKey)){
      m[careKey] = clamp(Number(m[careKey] || 0) + CONFIG.CARE_METER_STEP, 0, 100);
      // 累積記録：画面メーターは100で止まり昼寝で0に戻るが、こちらは加算し続ける
      state.care_meters_total[careKey] = Number(state.care_meters_total[careKey] || 0) + CONFIG.CARE_METER_STEP;
    }
    state.daily_score = careMeterAverage();

    const nowFull = allCareMetersFull();

    if(state.mode === "free" && !beforeFull && nowFull){
      maybeStartSatisfiedNap("all_four_care_meters_full");
      handleFreeCareFull();
    }else if(!beforeFull && nowFull){
      maybeStartSatisfiedNap("all_four_care_meters_full");
    }

    syncLifeClock();
    const logBucket = state.mode === "free" ? (state.free_logs || {}) : (state.logs || {});
    if(!state.sleeping && !state.poop && Math.random() < 0.18 && Number(logBucket.actions_total || 0) > 2) state.poop = true;
  }

  function doAction(action, choice="", extraDetails={}){
    syncLifeClock();
    if(state.rest_state === "satisfied"){
      const sp = $("petSpeech");
      if(sp) sp.textContent = restLine("satisfied");
      return;
    }
    const wokeByCare = wakeFromNoCareIfNeeded();
    if(state.sleeping && !wokeByCare){
      const sp = $("petSpeech");
      if(sp) sp.textContent = t("asleep");
      return;
    }
    const nowIso = new Date().toISOString();
    state.last_care_at = nowIso;
    if(!state.daily_care_started_at) state.daily_care_started_at = nowIso;
    const logBucket = state.mode === "free" ? (state.free_logs = state.free_logs || {visits:0, feed:0, outing:0, pet:0, clean:0, look:0, actions_total:0}) : state.logs;
    logBucket.actions_total += 1;
    if(logBucket[action] !== undefined) logBucket[action] += 1;
    const eng = engagementSettings();
    if(action === "feed") updateScores(10,0,"feed");
    if(action === "outing") updateScores(9,0,"outing");
    if(action === "pet"){ updateScores(12,0,"pet"); setTimeout(()=>addHearts("hearts",eng.heartsOnPet),30); }
    if(action === "clean"){ state.poop = false; updateScores(8,0,"clean"); }
    if(action === "look") updateScores(1,0,"");
    logEvent("game_action", {
      day:currentDay(),
      action,
      choice,
      choice_label: extraDetails.choice_label || localizedChoiceLabel(choice),
      presented_options: extraDetails.presented_options || [],
      presented_option_labels: extraDetails.presented_option_labels || [],
      affection:state.affection,
      daily_score:state.daily_score,
      care_meters_total:{...state.care_meters_total},
      full_meter_count:state.full_meter_count,
      poop:state.poop
    });
    saveState();
    renderGame(action, choice);
    showPendingZukanReward();
  }

    const colors = [
      {id:"pink", hex:"#ff8fb8", label:{ja:"ピンク", en:"pink", "zh-CN":"粉色"}},
      {id:"blue", hex:"#76c9ff", label:{ja:"青", en:"blue", "zh-CN":"蓝色"}},
      {id:"yellow", hex:"#ffd76b", label:{ja:"黄色", en:"yellow", "zh-CN":"黄色"}},
      {id:"green", hex:"#9be66f", label:{ja:"緑", en:"green", "zh-CN":"绿色"}},
      {id:"purple", hex:"#b88cff", label:{ja:"紫", en:"purple", "zh-CN":"紫色"}}
    ];
    const target = pick(colors);
    const shuffled = [...colors, target, target, target].sort(()=>Math.random()-.5);
    root.innerHTML = `
      <section class="card spaceCard center">
        <h2>${esc(cleanGameText("title"))}</h2>
        <p class="lead">${esc(cleanGameText("help"))}</p>
        <div class="cleanTarget" style="--target:${esc(target.hex)}"><span class="cleanDot"></span><span>${esc(cleanGameText("target"))}：${esc(target.label[L()] || target.label.ja)}</span></div>
        <div id="cleanProgress" class="speech" style="margin:12px auto 0">${esc(cleanGameText("remain").replace("{n}",3))}</div>
        <div id="cleanArea" class="cleanGameArea"></div>
        <button id="cleanBack" class="secondary" type="button">${esc(cleanGameText("back"))}</button>
      </section>`;
    const area = $("cleanArea");
    let correct = 0;
    let mistakes = 0;
    shuffled.forEach((color,i)=>{
      const el = document.createElement("button");
      el.type = "button";
      el.className = "movingPoop";
      el.textContent = "💩";
      el.dataset.color = color.id;
      el.style.setProperty("--ring", color.hex);
      el.style.left = `${8 + (i*13)%76}%`;
      el.style.top = `${10 + (i*27)%72}%`;
      el.style.setProperty("--dx", `${(i%2? -1:1)*(24+Math.floor(Math.random()*44))}px`);
      el.style.setProperty("--dy", `${(i%3? 1:-1)*(18+Math.floor(Math.random()*36))}px`);
      el.style.setProperty("--dur", `${(2.0+Math.random()*1.7).toFixed(2)}s`);
      el.addEventListener("click",()=>{
        if(el.classList.contains("cleaned")) return;
        if(el.dataset.color !== target.id){
          mistakes += 1;
          el.classList.add("wrong");
          showMiniToast(cleanGameText("wrong"));
          setTimeout(()=>el.classList.remove("wrong"),350);
          logEvent("poop_wrong_color", {target_color:target.id, clicked_color:el.dataset.color, mistakes});
          return;
        }
        correct += 1;
        el.classList.add("cleaned");
        $("cleanProgress").textContent = cleanGameText("remain").replace("{n}", Math.max(0,3-correct));
        logEvent("poop_correct_color", {target_color:target.id, correct});
        if(correct >= 3){
          completeCleanGame(target.id, mistakes);
        }
      });
      area.appendChild(el);
    });
    $("cleanBack").addEventListener("click",()=>renderGame("look"));
    logEvent("clean_game_start", {target_color:target.id});
  }

  function showMiniToast(message){
    const old = document.getElementById("miniToast");
    if(old) old.remove();
    const div = document.createElement("div");
    div.id = "miniToast";
    div.className = "speech";
    div.style.position = "fixed";
    div.style.left = "50%";
    div.style.top = "18px";
    div.style.transform = "translateX(-50%)";
    div.style.zIndex = "50";
    div.textContent = message;
    document.body.appendChild(div);
    setTimeout(()=>div.remove(),1200);
  }

  function completeCleanGame(targetColor, mistakes){
    const nowIso = new Date().toISOString();
    state.last_care_at = nowIso;
    if(!state.daily_care_started_at) state.daily_care_started_at = nowIso;
    state.poop = false;
    updateScores(8,0,"clean");
    const logBucket = state.mode === "free" ? (state.free_logs = state.free_logs || {visits:0, feed:0, outing:0, pet:0, clean:0, look:0, actions_total:0}) : state.logs;
    logBucket.actions_total += 1;
    logBucket.clean += 1;
    logEvent("game_action", {day:currentDay(), action:"clean", choice:targetColor, affection:state.affection, daily_score:state.daily_score, care_meters_total:{...state.care_meters_total}, full_meter_count:state.full_meter_count, poop:state.poop, mistakes});
    saveState();
    renderGame("clean");
    showPendingZukanReward();
  }

  function getFinalSurveyAnswers(){
    const answers = {};
    FINAL_SURVEY_QUESTIONS.forEach(q => {
      const el = $(q.key);
      answers[q.key] = el && el.value ? Number(el.value) : null;
    });
    return answers;
  }

  function validateSurvey(){
    if(!$("ageGroup")?.value || !$("gender")?.value || !$("qNoticeChange")?.value) return false;
    return FINAL_SURVEY_QUESTIONS.every(q => $(q.key)?.value);
  }

  function calculateFinalIdentityPercent(answers){
    // 7件法用：逆転項目は 8 - 回答値、満点は 7 + 7 = 14
    const positive = ["same_existence","relationship_continuity","my_partner","memory_clue"]
      .reduce((sum,key)=>sum + Number(answers[key] || 0),0) / 4;
    const reverseUnsure = answers.change_makes_unsure ? 8 - Number(answers.change_makes_unsure) : 4;
    return clamp(Math.round(((positive + reverseUnsure) / 14) * 100), 0, 100);
  }

  function deriveSurveyReasons(noticedParts){
    const reasons = [];
    if(noticedParts.includes("name")) reasons.push("name");
    if(noticedParts.includes("appearance")) reasons.push("look");
    if(noticedParts.includes("behavior")) reasons.push("personality");
    if(noticedParts.includes("care_log") || noticedParts.includes("relationship")) reasons.push("memory");
    if(noticedParts.includes("feeling")) reasons.push("feeling");
    if(noticedParts.includes("my_action")) reasons.push("action");
    return reasons;
  }

  function submitSurvey(){
    if(!validateSurvey()){ alert(t("missing")); return; }
    const answers = getFinalSurveyAnswers();
    const noticedParts = Array.from(document.querySelectorAll('input[name="noticed_parts"]:checked')).map(x=>x.value);
    const reasons = deriveSurveyReasons(noticedParts);
    state.survey = {
      age_group: $("ageGroup").value,
      gender: $("gender").value,
      answers,
      identity_score: Number(answers.same_existence || 0),
      attachment_score: Number(answers.attachment_importance || 0),
      concern_score: Number(answers.concern_when_absent || 0),
      relationship_continuity_score: Number(answers.relationship_continuity || 0),
      my_partner_score: Number(answers.my_partner || 0),
      memory_clue_score: Number(answers.memory_clue || 0),
      reaction_clue_score: Number(answers.reaction_clue || 0),
      change_makes_unsure_score: Number(answers.change_makes_unsure || 0),
      identity_continuity_percent: calculateFinalIdentityPercent(answers),
      noticed_change: $("qNoticeChange").value,
      noticed_parts: noticedParts,
      reasons,
      free_text: $("qFree").value.trim(),
      likert_scale: 7
    };
    state.completed_survey = true;
    state.screen = "result";
    saveState();
    logEvent("survey_submit", {

      full_meter_count: state.full_meter_count,
      source: "embedded_final_survey_in_full_index_7likert"
    });
    renderResult();
  }

  function zukanImagePath(card){
    if(!card || !card.file) return "";
    return "public/assets/pets/" + card.file;
  }

  window.showMissingZukanImage = function(img){
    const label = img.dataset.label || "";
    const small = img.dataset.small === "1";
    if(small){
      img.outerHTML = `<div class="zukanMissingImage small" aria-label="${esc(label)}">?</div>`;
      return;
    }
    img.outerHTML = `<div class="zukanMissingImage" aria-label="${esc(label)}"><div><div class="zukanMissingMark">?</div><div class="zukanMissingText">画像未設定</div></div></div>`;
  };

  function companionCardTitle(card){
    const name = localLabel(card?.label);
    if(L()==="en") return `Your perfect companion is ${name}.`;
    if(L()==="zh-CN") return `最适合你的小伙伴是${name}。`;
    return `あなたにぴったりな相棒は「${name}」です。`;
  }

  function companionSilhouetteHtml(card){
    const src = zukanImagePath(card);
    const label = localLabel(card?.label);
    if(!src){
      return `<div class="zukanSilhouetteWrap"><div class="zukanMissingImage" aria-label="${esc(label)}"><div><div class="zukanMissingMark">?</div><div class="zukanMissingText">画像未設定</div></div></div></div>`;
    }
    return `<div class="zukanSilhouetteWrap"><img class="zukanSilhouetteImg" draggable="false" data-no-visual-search="true" oncontextmenu="return false" src="${esc(src)}" data-label="${esc(label)}" alt="${esc(label)}" onerror="showMissingZukanImage(this)"></div>`;
  }
  function resultTextByProfile(profile){
    const dict = {
      pet:{
        ja:["ふれあいを大切にする相棒","なでたり、近くにいたりしながら、相棒との距離を少しずつ縮めていけます。"],
        en:["Companion who enjoys closeness","This companion suits someone who builds closeness by staying nearby and caring gently."],
        "zh-CN":["喜欢亲近的小伙伴","适合通过靠近和轻轻照护，慢慢拉近距离的人。"]
      },
      feed:{
        ja:["ごはんで気持ちを返してくれる相棒","食べることや安心できるリズムを大切にしながら、関わりを育てていけます。"],
        en:["Companion who loves steady care","This companion suits someone who values feeding, comfort, and a steady rhythm."],
        "zh-CN":["喜欢稳定照护的小伙伴","适合重视喂食、安心感和日常节奏的人。"]
      },
      outing:{
        ja:["おでかけを楽しむ相棒","一緒に体験することを通して、相棒との関係をつくっていけます。"],
        en:["Companion who enjoys little adventures","This companion suits someone who builds a relationship through shared experiences."],
        "zh-CN":["喜欢外出的小伙伴","适合通过共同体验来建立关系的人。"]
      },
      clean:{
        ja:["こまめな見守りに応えてくれる相棒","小さな変化に気づきながら、相棒が安心できる環境を整えていけます。"],
        en:["Companion who responds to careful care","This companion suits someone who notices small changes and keeps things comfortable."],
        "zh-CN":["回应细心照护的小伙伴","适合注意小变化、营造安心环境的人。"]
      },
      memory:{
        ja:["記憶を大切にしてくれる相棒","これまで一緒に過ごした時間や、反応のつながりを大切にしてくれる相棒です。"],
        en:["Companion who treasures shared memories","This companion suits someone who values shared history and continuity."],
        "zh-CN":["珍惜共同记忆的小伙伴","适合重视一起度过的时间和关系连续感的人。"]
      },
      balanced:{
        ja:["自然体で寄り添える相棒","特別に意識していなくても、必要なところで自然に関わっていける相棒です。"],
        en:["Companion who fits a natural rhythm","This companion suits someone who cares naturally without forcing it."],
        "zh-CN":["自然陪伴的小伙伴","适合自然地照顾需要之处、不用力过度的人。"]
      },
      occasional:{
        ja:["自分のペースで会いに来られる相棒","ずっと張りつくのではなく、自分のペースで思い出して会いに来られる相棒です。"],
        en:["Companion for your own pace","This companion suits someone who comes back at their own pace rather than staying all the time."],
        "zh-CN":["适合自己节奏的小伙伴","适合按照自己的节奏想起它、来看它的人。"]
      }
    };
    const pair = dict[profile]?.[L()] || dict[profile]?.ja || dict.balanced.ja;
    return {title:pair[0], text:pair[1]};
  }
  function dominantCareProfile(){
    const l = state.logs || {};
    const values = {feed:l.feed||0, outing:l.outing||0, pet:l.pet||0, clean:l.clean||0, look:l.look||0};
    const maxKey = Object.keys(values).sort((a,b)=>values[b]-values[a])[0];
    if((l.actions_total||0) <= 6) return "occasional";
    if(state.survey?.reasons?.includes("memory") || Number(state.survey?.concern_score||0) >= 5) return "memory";
    if(maxKey === "pet" && values.pet >= 3) return "pet";
    if(maxKey === "feed" && values.feed >= 3) return "feed";
    if(maxKey === "outing" && values.outing >= 3) return "outing";
    if(maxKey === "clean" && values.clean >= 2) return "clean";
    return "balanced";
  }
  function pickZukanPet(profile){
    const groups = {
      pet:[13,17,18,21,27,47,48,50],
      feed:[1,2,3,4,11,12,32,40],
      outing:[23,25,26,29,30,33,41,45],
      clean:[5,6,7,8,9,10,31,36],
      memory:[14,15,16,24,35,42,43,44],
      occasional:[20,22,34,37,38,39,46,49],
      balanced:[18,23,27,30,41,43,48,50]
    };
    const nums = groups[profile] || groups.balanced;
    const l = state.logs || {};
    const s = state.survey || {};
    const seed =
      (l.feed||0)*3 + (l.outing||0)*5 + (l.pet||0)*7 + (l.clean||0)*11 + (l.look||0)*13 +
      Number(s.identity_score||0)*17 + Number(s.attachment_score||0)*19 + Number(s.concern_score||0)*23 +
      String(s.noticed_change||"").length*29 + (s.reasons||[]).join("").length*31 +
      String(state.research_id||"").split("").reduce((a,c)=>a+c.charCodeAt(0),0);
    const no = nums[Math.abs(seed) % nums.length];
    return PET_ZUKAN_CARDS.find(p=>p.no===no) || PET_ZUKAN_CARDS[0];
  }
  function judgeCareType(){
    const profile = dominantCareProfile();
    const pet = pickZukanPet(profile);
    const txt = resultTextByProfile(profile);
    const lang = L();
    const basis = lang === "en"
      ? "Selected as a companion card using your care log and final survey answers."
      : lang === "zh-CN"
        ? "根据你的照护日志和最后问卷回答，显示这张小伙伴卡片。"
        : "5日間のお世話ログと最後のアンケート回答をもとに、相棒カードを表示しています。";
    return {profile, pet, title:txt.title, text:txt.text, basis};
  }

  function todayKey(){
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,"0");
    const day = String(d.getDate()).padStart(2,"0");
    return `${y}-${m}-${day}`;
  }

  function ensureZukan(){
    state.zukan = state.zukan || {};
    state.zukan.collected = Array.isArray(state.zukan.collected) ? state.zukan.collected : [];
    if(typeof state.zukan.last_no !== "number") state.zukan.last_no = state.zukan.last_no || null;
    if(typeof state.zukan.companion_no !== "number") state.zukan.companion_no = state.zukan.companion_no || null;
    if(typeof state.zukan.heart_progress !== "number") state.zukan.heart_progress = 0;
    if(typeof state.zukan.total_hearts !== "number") state.zukan.total_hearts = 0;
    if(typeof state.zukan.gifts_today !== "number") state.zukan.gifts_today = 0;
    if(typeof state.zukan.gift_date !== "string") state.zukan.gift_date = "";
    if(typeof state.zukan.pending_reward_no !== "number") state.zukan.pending_reward_no = null;
    if(typeof state.zukan.pending_notice !== "string") state.zukan.pending_notice = "";
    normalizeZukanDaily();
    return state.zukan;
  }

  function normalizeZukanDaily(){
    if(!state.zukan) return;
    const today = todayKey();
    if(!state.zukan.gift_date){
      state.zukan.gift_date = today;

    if(state.zukan.gift_date !== today){
      state.zukan.gift_date = today;

  function collectOneZukanPet(force=false, source="manual"){
    const z = ensureZukan();
    if(z.collected.length >= PET_ZUKAN_CARDS.length) return null;
    if(!force) return null;
    const remaining = PET_ZUKAN_CARDS.filter(p => !z.collected.includes(p.no));
    const seed = (state.free_logs?.actions_total || 0) * 17 + Date.now();
    const card = remaining[Math.abs(seed) % remaining.length] || remaining[0];
    z.collected.push(card.no);
    z.last_no = card.no;
    saveState();
    logEvent("zukan_collect", {pet_no:card.no, pet_label:localLabel(card.label), pet_type:localType(card), collected:z.collected.length, source});
    return card;
  }

  function handleFreeCareFull(){
    const z = ensureZukan();
    const need = CONFIG.ZUKAN_HEARTS_REQUIRED;
    const limit = CONFIG.ZUKAN_DAILY_CARD_LIMIT;

    z.total_hearts = Number(z.total_hearts || 0) + 1;
    z.heart_progress = Math.min(need, Number(z.heart_progress || 0) + 1);

    // 100%達成後は、つづきのお世話で続けて遊べるように4つのお世話メーターを0%に戻します。
    resetCareMeters();

    if(z.heart_progress >= need){
      if(z.gifts_today >= limit){
        z.pending_notice = "daily_limit";
        return null;
      }

      const card = collectOneZukanPet(true, "heart3");
      if(card){
        z.gifts_today = Number(z.gifts_today || 0) + 1;
        z.heart_progress = 0;
        z.pending_reward_no = card.no;
        z.pending_notice = "";
        return card;
      }

      z.pending_notice = "complete";
    }

    return null;
  }

  async function shareToSNS(type){
    const url = safePublicGameUrl();
    const copyText = shareInvitationText(type);
    const nativeText = shareNativeText(type);

    try{
      const blob = await createShareCardBlob(type);
      const file = blob ? new File([blob], "IdealPaw_share_card.png", {type:"image/png"}) : null;

      // スマホなど、画像ファイル付き共有に対応している環境では、
      // カード画像・本文・URLをまとめて共有シートへ渡します。
      if(navigator.share){
        if(file && navigator.canShare && navigator.canShare({files:[file], title:"IdealPaw", text:nativeText, url})){
          await navigator.share({
            title:"IdealPaw",
            text:nativeText,
            url,
            files:[file]
          });
          return;
        }

        // 画像ファイル付き共有に未対応でも、本文とURLだけは共有できます。
        await navigator.share({
          title:"IdealPaw",
          text:nativeText,
          url
        });

      }

      // PCブラウザやDiscordなど、Web側から画像を自動添付できない場合は、
      // 画像を保存し、共有文をコピーして、投稿欄へ手動で貼り付ける方式にします。
      await downloadShareCardImage(type);
      try{
        if(navigator.clipboard && window.isSecureContext){
          await navigator.clipboard.writeText(copyText);
        }else{
          const ta = document.createElement("textarea");
          ta.value = copyText;

          ta.style.left = "-9999px";

          ta.focus();

      alert(L()==="ja"
        ? "カード画像を保存し、共有文をコピーしました。DiscordやSNSで画像を添付して、文章を貼り付けてください。"

  function drawRoundedRect(ctx,x,y,w,h,r){
    const rr = Math.min(r, w/2, h/2);
    ctx.beginPath();
    ctx.moveTo(x+rr,y);
    ctx.lineTo(x+w-rr,y);
    ctx.quadraticCurveTo(x+w,y,x+w,y+rr);
    ctx.lineTo(x+w,y+h-rr);
    ctx.quadraticCurveTo(x+w,y+h,x+w-rr,y+h);
    ctx.lineTo(x+rr,y+h);
    ctx.quadraticCurveTo(x,y+h,x,y+h-rr);
    ctx.lineTo(x,y+rr);
    ctx.quadraticCurveTo(x,y,x+rr,y);
    ctx.closePath();
  }

  function drawWrappedText(ctx, text, x, y, maxWidth, lineHeight, maxLines=5){
    const chars = Array.from(String(text || ""));
    let line = "";
    let lines = [];
    for(const ch of chars){
      const test = line + ch;
      if(ctx.measureText(test).width > maxWidth && line){
        lines.push(line);
        line = ch;
        if(lines.length >= maxLines - 1) break;
      }else{
        line = test;
      }
    }
    if(line) lines.push(line);
    if(lines.length > maxLines) lines = lines.slice(0,maxLines);
    lines.forEach((ln,i)=>ctx.fillText(ln, x, y + i*lineHeight));
    return y + lines.length*lineHeight;
  }

  function imageVisibleBounds(img){
    try{
      const iw = img.naturalWidth || img.width;
      const ih = img.naturalHeight || img.height;
      if(!iw || !ih) return null;
      const c = document.createElement("canvas");
      c.width = iw;
      c.height = ih;
      const cctx = c.getContext("2d");
      cctx.drawImage(img, 0, 0);
      const data = cctx.getImageData(0, 0, iw, ih).data;
      let minX = iw, minY = ih, maxX = -1, maxY = -1;
      for(let y=0; y<ih; y++){
        for(let x=0; x<iw; x++){
          const a = data[(y*iw + x)*4 + 3];
          if(a > 8){
            if(x < minX) minX = x;
            if(y < minY) minY = y;
            if(x > maxX) maxX = x;
            if(y > maxY) maxY = y;
          }
        }
      }
      if(maxX < minX || maxY < minY) return null;
      return {x:minX, y:minY, w:maxX-minX+1, h:maxY-minY+1};
    }catch(e){
      return null;
    }
  }

  function drawImageContain(ctx,img,x,y,w,h, options={}){
    if(!img) return false;
    const iw = img.naturalWidth || img.width;
    const ih = img.naturalHeight || img.height;
    if(!iw || !ih) return false;
    const b = imageVisibleBounds(img) || {x:0, y:0, w:iw, h:ih};
    const scale = Math.min(w/b.w, h/b.h);
    const dw = b.w * scale;
    const dh = b.h * scale;
    const dx = x + (w-dw)/2;
    const dy = y + (h-dh)/2;

    ctx.save();
    if(options.silhouette && "filter" in ctx){
      ctx.filter = "grayscale(1) brightness(0.18) contrast(2.2)";
    }
    ctx.drawImage(img, b.x, b.y, b.w, b.h, dx, dy, dw, dh);
    ctx.restore();
    return true;
  }

  async function drawShareCardCanvas(type){
    const canvas = document.createElement("canvas");
    canvas.width = 1080;
    canvas.height = 1350;
    const ctx = canvas.getContext("2d");
    const grad = ctx.createLinearGradient(0,0,1080,1350);
    grad.addColorStop(0,"#fff9df");
    grad.addColorStop(.55,"#ffe7f0");
    grad.addColorStop(1,"#e7f7ff");
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,1080,1350);

    ctx.globalAlpha = .38;
    for(let i=0;i<70;i++){
      ctx.beginPath();
      ctx.arc(Math.random()*1080, Math.random()*1350, 2 + Math.random()*5, 0, Math.PI*2);
      ctx.fillStyle = "#ffffff";
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    ctx.fillStyle = "rgba(255,255,255,.76)";
    drawRoundedRect(ctx,80,80,920,1190,64);
    ctx.fill();

    const pet = type.pet;
    const petName = localLabel(pet.label);
    const img = await loadImageForCanvas(zukanImagePath(pet));

    ctx.fillStyle = "rgba(255,255,255,.70)";
    drawRoundedRect(ctx,230,180,620,430,64);
    ctx.fill();
    if(!drawImageContain(ctx,img,290,230,500,320,{silhouette:true})){
      ctx.fillStyle = "#746680";
      ctx.font = "bold 110px sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("?", 540, 430);
    }

    ctx.textAlign = "center";
    ctx.fillStyle = "#3e3155";
    ctx.font = L()==="en" ? "bold 52px sans-serif" : "bold 50px sans-serif";
    const mainCatchLines = shareCardMainCatch(type).split("\n");
    mainCatchLines.forEach((line,i)=>ctx.fillText(line, 540, 720 + i*70));

    const url = safePublicGameUrl();
    ctx.fillStyle = "rgba(255,255,255,.82)";
    drawRoundedRect(ctx,140,970,800,140,34);
    ctx.fill();
    ctx.fillStyle = "#4b3c65";
    ctx.font = "bold 28px sans-serif";
    drawWrappedText(ctx, url, 540, 1030, 720, 40, 2);

    return canvas;
  }

  async function createShareCardBlob(type){
    const canvas = await drawShareCardCanvas(type);
    return await new Promise(resolve => canvas.toBlob(resolve, "image/png"));
  }

  async function downloadShareCardImage(type){
    const canvas = await drawShareCardCanvas(type);
    const dataUrl = canvas.toDataURL("image/png");
    const a = document.createElement("a");
    const safeTitle = String(type.title || "share_card").replace(/[\\/:*?"<>|]/g, "_");
    a.href = dataUrl;
    a.download = `IdealPaw_${safeTitle}.png`;
    a.click();

    const preview = $("generatedShareCardPreview");
    if(preview){
      preview.innerHTML = `<p class="small">${esc(shareSectionText("preview"))}</p><img src="${dataUrl}" alt="share card preview">`;
    }
  }


  function renderResult(){
    const type = judgeCareType();
    state.zukan = state.zukan || {collected:[], last_no:null, companion_no:null};
    state.zukan.companion_no = type.pet.no;
    saveState();
    root.innerHTML = `
      <section class="card">
        <h2>${esc(t("thanks"))}</h2>
        <p>${esc(t("thanksText"))}</p>
        <div class="resultCard">
          <div class="pill">${esc(t("cardTitle"))}</div>
          <div class="zukanNo">PET ZUKAN No.${String(type.pet.no).padStart(2,"0")}</div>
          ${companionSilhouetteHtml(type.pet)}
          <div class="petLabel">${esc(localLabel(type.pet.label))}</div>
          <div class="zukanType">${esc(localType(type.pet))}</div>
          <h2>${esc(type.title)}</h2>
          <p>${esc(type.text)}</p>
          <p><strong>${esc(companionCardTitle(type.pet))}</strong></p>
          <div class="zukanCardMessage">${esc(localMessage(type.pet))}</div>
          <p class="basisText">${esc(type.basis)}</p>
        </div>
        <p class="small">${esc(t("cardNote"))}</p>
        ${sharePreviewHtml(type)}
        <p class="small">${esc(L()==="ja" ? "このあと、研究とは別に相棒とのお世話を続けることもできます。続ける場合は、ここから先は「つづきのお世話」として遊べます。" : L()==="en" ? "After this, you can keep caring for a companion separately from the research part. If you continue, it will be Continued Care." : "之后，你也可以在研究部分之外继续照护小伙伴。继续的话，这一部分是“继续照护”。")}</p>
        <div class="row">
          <button id="continueFreeBtn" type="button">${esc(t("continueFree"))}</button>
          <button id="endBtn" class="secondary" type="button">${esc(t("end"))}</button>
        </div>
      </section>`;
    bindShareButtons(type);
    $("continueFreeBtn").addEventListener("click", enterFreeMode);
    $("endBtn").addEventListener("click", () => { logEvent("end",{}); setScreen("end"); });
  }

  function enterFreeMode(){
    const z = ensureZukan();
    const companionNo = z.companion_no || judgeCareType().pet.no;
    const collected = Array.isArray(z.collected) ? z.collected.slice() : [];
    if(!collected.includes(companionNo)) collected.push(companionNo);

    state.mode = "free";
    state.completed_survey = true;
    state.condition_id = "";
    state.engagement_id = "";
    state.changed_applied = false;
    state.renamed_after_change = true;
    state.memory_cues_enabled = true;

    // つづきのお世話は研究の続きではなく、最初と同じ「プレゼント→マカロン→誕生」から始めます。
    state.gift_opened_at = "";
    state.hatch_at = "";
    state.care_started_at = "";
    state.macaron_color = "";
    state.macaron_img = "";
    state.character_id = "";
    state.original_character_id = "";
    state.display_character_id = "";
    state.pet_name = "";
    state.original_pet_name = "";

    state.affection = 0;
    resetCareMeters();
    state.sleeping = false;
    state.rest_state = "";
    state.rest_state_decided_at = "";
    state.last_care_at = "";
    state.daily_care_started_at = "";
    state.satisfied_sleep_until = "";
    state.poop = false;
    state.free_started_at = new Date().toISOString();
    state.life_day_marker = "free-1";
    state.day_override = 0;
    state.free_logs = {visits:0, feed:0, outing:0, pet:0, clean:0, look:0, actions_total:0};
    state.zukan = {collected, last_no:companionNo, companion_no:companionNo, heart_progress:0, total_hearts:0, gifts_today:0, gift_date:todayKey(), pending_reward_no:null, pending_notice:""};
    state.free_debug = [];
    state.screen = "gift";
    saveState();
    logEvent("free_play_prepare_gift", {start_from:"gift", companion_no:companionNo, research_log:false});
    renderGift();
  }

  function renderEnd(){
    root.innerHTML = `
      <section class="card center">
        <h2>${esc(t("endedTitle"))}</h2>
        <p>${esc(t("endedText"))}</p>
        <p class="small">${esc(t("closeWindow"))}</p>
      </section>`;
  }


  function helpFaqText(key){
    const lang = L();
    const dict = {
      title:{ja:"こまったとき", en:"Help", "zh-CN":"遇到问题时"},
      intro:{ja:"ゲームがうまく動かないときは、あてはまるものを選んでください。", en:"If the game does not work well, choose the item that fits your situation.", "zh-CN":"游戏无法正常运行时，请选择符合情况的项目。"},
      privacy:{ja:"ここでは、名前、学校名、メールアドレスなどの個人情報は入力しないでください。", en:"Do not enter personal information such as your name, school name, or email address here.", "zh-CN":"请不要在这里输入姓名、学校名、电子邮件地址等个人信息。"},
      close:{ja:"閉じる", en:"Close", "zh-CN":"关闭"}
    };
    return dict[key]?.[lang] || dict[key]?.ja || key;
  }

        {q:"画面が進まない", a:"ページを一度再読み込みしてください。\n改善しない場合は、ブラウザを閉じてから、もう一度同じURLを開いてください。"},
        {q:"キャラクターが出てこない", a:"通信状況によって、表示に時間がかかることがあります。\n少し待ってから、もう一度画面を開いてください。"},
        {q:"前の続きにならない", a:"同じ端末・同じブラウザで開いてください。\n別の端末や別のブラウザで開くと、前の続きにならないことがあります。"},
        {q:"キャラクターの様子が変わった気がする", a:"ゲームの中では、日によってキャラクターの様子や反応が変わって見えることがあります。\n感じたことは、最後のアンケートでそのまま答えてください。"},
        {q:"アンケートに進めない", a:"5日目の最後にアンケート画面へ進みます。\n表示されない場合は、ページを一度再読み込みしてください。"},
        {q:"SNSに投稿できない", a:"画像を保存してから、ご自身でSNSアプリを開いて投稿してください。\nSNSへ自動で投稿されることはありません。"}

        {q:"I cannot post to SNS", a:"Please save the image first, then open your SNS app and post it yourself.\nIt will not be posted automatically to SNS."}
      ],
      "zh-CN":[
        {q:"画面无法继续", a:"请重新加载页面一次。\n如果仍然没有改善，请关闭浏览器后，再次打开同一个URL。"},
        {q:"角色没有出现", a:"根据通信状况，显示可能需要一些时间。\n请稍等一下，然后再次打开画面。"},
        {q:"不能从上次继续", a:"请使用同一设备和同一浏览器打开。\n如果用其他设备或其他浏览器打开，可能无法从上次的状态继续。"},
        {q:"感觉角色的样子变了", a:"在游戏中，角色的样子或反应可能会根据日期而看起来不同。\n请在最后的问卷中，按自己的感受回答。"},
        {q:"无法进入问卷", a:"第5天的最后会进入问卷画面。\n如果没有显示，请重新加载页面一次。"},
        {q:"无法发布到SNS", a:"请先保存图片，然后自己打开SNS应用进行发布。\n不会自动发布到SNS。"}
      ]
    };
    return items[lang] || items.ja;
  }

  function updateHelpFaqButtonText(){
    const btn = $("helpFaqBtn");
    if(!btn) return;
    btn.textContent = "?";
    btn.title = helpFaqText("title");
    btn.setAttribute("aria-label", helpFaqText("title"));
  }

  function openHelpFaqModal(){
    $("helpFaqTitle").textContent = helpFaqText("title");
    $("helpFaqIntro").textContent = helpFaqText("intro");
    $("helpFaqPrivacy").textContent = helpFaqText("privacy");
    $("helpFaqCloseBtn").textContent = helpFaqText("close");
    $("helpFaqList").innerHTML = helpFaqItems().map(item => `
      <details class="helpFaqItem">
        <summary>${esc(item.q)}</summary>
        <p>${esc(item.a)}</p>
      </details>`).join("");
    $("helpFaqModal").classList.remove("hidden");
  }

  let deferredInstallPrompt = null;

  function installText(key){
    const lang = L();
    const dict = {
      button:{ja:"スマホに残す", en:"Save to phone", "zh-CN":"保存到手机"},
      title:{ja:"スマホに残す", en:"Save to your phone", "zh-CN":"保存到手机"},
      run:{ja:"ホーム画面に追加", en:"Add to home screen", "zh-CN":"添加到主屏幕"},
      close:{ja:"閉じる", en:"Close", "zh-CN":"关闭"},
      text:{ja:"このゲームをスマホのホーム画面にアイコンとして残せます。次回からアプリのように開けます。", en:"You can keep this game as an icon on your phone’s home screen and open it like an app next time.", "zh-CN":"可以把这个游戏作为图标保存到手机主屏幕，下次像应用一样打开。"},
      android:{ja:"Android / Chrome の場合：このボタンで追加画面が出ます。出ない場合は、ブラウザ右上のメニューから「ホーム画面に追加」を選んでください。", en:"Android / Chrome: this button may open the install prompt. If it does not, open the browser menu and choose Add to Home screen.", "zh-CN":"Android / Chrome：这个按钮可能会打开添加提示。如果没有出现，请从浏览器菜单选择“添加到主屏幕”。"},
      ios:{ja:"iPhone / Safari の場合：下の共有ボタンを押して「ホーム画面に追加」を選んでください。iPhoneではWebページ側から自動で追加画面を出せません。", en:"iPhone / Safari: tap the Share button and choose Add to Home Screen. iPhone does not allow websites to open this prompt automatically.", "zh-CN":"iPhone / Safari：请点击分享按钮，然后选择“添加到主屏幕”。iPhone 不允许网页自动打开这个提示。"},
      done:{ja:"追加画面を開きました。", en:"Install prompt opened.", "zh-CN":"已打开添加提示。"},
      unavailable:{ja:"この端末では自動追加画面を開けません。説明に沿って、ブラウザのメニューから追加してください。", en:"This device cannot open the install prompt automatically. Please use the browser menu as described.", "zh-CN":"这台设备无法自动打开添加提示。请按照说明从浏览器菜单添加。"}
    };
    return dict[key]?.[lang] || dict[key]?.ja || key;
  }

  function updateInstallButtonText(){
    const btn = $("installAppBtn");
    if(btn) btn.textContent = installText("button");
  }

  function openInstallModal(){
    $("installTitle").textContent = installText("title");
    $("installText").textContent = installText("text");
    $("installHelp").innerHTML = `${esc(installText("android"))}<br><br>${esc(installText("ios"))}`;
    $("installRunBtn").textContent = installText("run");
    $("installCloseBtn").textContent = installText("close");
    $("installModal").classList.remove("hidden");
  }

  async function runInstallPrompt(){
    if(deferredInstallPrompt){
      const promptEvent = deferredInstallPrompt;
      deferredInstallPrompt = null;
      promptEvent.prompt();
      try{ await promptEvent.userChoice; }catch(e){}
      showMiniToast(installText("done"));
      $("installModal").classList.add("hidden");
      return;
    }
    alert(installText("unavailable"));
  }

  window.addEventListener("beforeinstallprompt", (e) => {
    e.preventDefault();
    deferredInstallPrompt = e;
  });

  function restoreRoute(){
    $("appVersion").textContent = CONFIG.APP_VERSION;
    syncLifeClock();
    if(!state.research_id){ state.screen = "intro"; saveState(); return renderIntro(); }
    if(state.completed_survey && state.mode === "research"){ state.screen = "result"; saveState(); return renderResult(); }
    if(openSurveyAfterDay5()) return;
    if(state.mode === "free"){
      if(!state.gift_opened_at){ state.screen = "gift"; saveState(); return renderGift(); }
      if(!state.hatch_at){ return startHatching(); }
      if(!state.pet_name){ state.screen = "namePet"; saveState(); return renderNamePet(); }
      state.screen = state.screen === "zukan" ? "zukan" : "game";
      saveState();
      return state.screen === "zukan" ? renderZukanCollection() : renderGame("look");
    }
    if(!state.gift_opened_at){ state.screen = "gift"; saveState(); return renderGift(); }
    if(!state.hatch_at){ return startHatching(); }
    if(!state.pet_name && state.condition_id !== "C1"){ state.screen = "namePet"; saveState(); return renderNamePet(); }
    if(!state.care_started_at){ state.care_started_at = state.hatch_at; }
    if(!state.life_day_marker){ state.life_day_marker = `research-${currentDay()}`; }
    ensureCareMeters();
    if(!state.last_care_at){ state.last_care_at = state.care_started_at || state.hatch_at; }
    if(!state.daily_care_started_at){ state.daily_care_started_at = state.last_care_at; }
    state.screen = "game";
    saveState();
    renderGame("look");
  }

  if($("installAppBtn")) $("installAppBtn").addEventListener("click", openInstallModal);
  if($("helpFaqBtn")) $("helpFaqBtn").addEventListener("click", openHelpFaqModal);
  if($("helpFaqCloseBtn")) $("helpFaqCloseBtn").addEventListener("click", () => $("helpFaqModal").classList.add("hidden"));
  if($("helpFaqModal")) $("helpFaqModal").addEventListener("click", (e) => { if(e.target && e.target.id === "helpFaqModal") $("helpFaqModal").classList.add("hidden"); });
  if($("installCloseBtn")) $("installCloseBtn").addEventListener("click", () => $("installModal").classList.add("hidden"));
  if($("installRunBtn")) $("installRunBtn").addEventListener("click", runInstallPrompt);

  $("choiceClose").addEventListener("click", () => $("choiceModal").classList.add("hidden"));
  $("renameSubmit").addEventListener("click", () => {
    const name = ($("renameInput").value || "").trim() || (L()==="en" ? "Buddy" : L()==="zh-CN" ? "伙伴" : "相棒");
    state.pet_name = name;
    state.renamed_after_change = true;
    $("renameModal").classList.add("hidden");
    saveState();
    logEvent("rename_after_change", {pet_name_entered:true});
    renderGame("look");
  });
  $("resetLocalBtn").addEventListener("click", () => {
    const lang = L();
    const input = prompt(
      lang === "en"
        ? "Enter the reset keyword."
        : lang === "zh-CN"
          ? "请输入重置关键词。"
          : "リセット用キーワードを入力してください。"
    );
    if(input === null) return;
    if(String(input).trim() !== CONFIG.RESET_PASSWORD){
      alert(
        lang === "en"
          ? "The reset keyword is incorrect."
          : lang === "zh-CN"
            ? "重置关键词不正确。"
            : "リセット用キーワードが違います。"
      );
      return;
    }
    if(confirm(lang === "en" ? "Start over on this device?" : lang === "zh-CN" ? "要在这台设备上从头开始吗？" : "この端末のゲーム進行を最初からやり直しますか？")){
      localStorage.removeItem(STORAGE_KEY);
      const suffix = CONFIG.ADMIN_MODE ? "?admin=1" : "";
      location.href = location.pathname + suffix;
    }
  });

  $("resetLocalBtn").textContent = t("reset");
  updateInstallButtonText();
  $("resetLocalBtn").classList.remove("hidden");
  disableBrowserImageSearch(document);
  setupAdminMode();
  restoreRoute();
  updateAdminPanels();

  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("./sw.js").catch(() => {});
    });
  }
})();
</script>
</body>
</html>
